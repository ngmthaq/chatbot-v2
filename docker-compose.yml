services:
  mysql:
    image: mysql:8.4
    container_name: chatbot-mysql
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "${MYSQL_PORT}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 10

  adminer:
    image: adminer:4
    container_name: chatbot-adminer
    restart: unless-stopped
    env_file:
      - .env.docker
    depends_on:
      mysql:
        condition: service_healthy
    ports:
      - "${ADMINER_PORT}:8080"

  minio:
    image: minio/minio:RELEASE.2024-12-18T13-15-44Z
    container_name: chatbot-minio
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data

  redis:
    image: redis:7-alpine
    container_name: chatbot-redis
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  ollama:
    image: ollama/ollama:0.5.4
    container_name: chatbot-ollama
    restart: unless-stopped
    env_file:
      - .env.docker
    ports:
      - "${OLLAMA_PORT}:11434"
    volumes:
      - ollama_data:/root/.ollama

volumes:
  mysql_data:
  minio_data:
  redis_data:
  ollama_data:
